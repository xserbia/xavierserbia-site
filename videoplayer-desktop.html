<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>XS – Vimeo Desktop</title>

  <style>
    :root{
      --bg:#ffffff;
      --ink:#0f172a;
      --muted:#64748b;
      --stroke:#e5e7eb;
      --accent:#3956E8;
      --radius:16px;
      --shadow: 0 10px 28px rgba(2,6,23,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    /* Desktop container */
    .page{
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px 22px 28px;
    }

    /* Top */
    .top{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      margin-bottom: 14px;
    }
    .brand{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }
    .brand h1{
      margin:0;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: .1px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brand p{
      margin:0;
      font-size: 13px;
      color: var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .pill{
      font-size:13px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--stroke);
      color: var(--muted);
      white-space:nowrap;
      background: #fff;
    }

    /* Player */
    .player{
      position:relative;
      width:100%;
      border:1px solid var(--stroke);
      border-radius: 22px;
      overflow:hidden;
      background:#000;
      box-shadow: var(--shadow);
    }
    .player::before{ content:""; display:block; padding-top: 52.5%; } /* slightly taller than 16:9 */
    .player iframe{
      position:absolute; inset:0;
      width:100%; height:100%;
      border:0;
    }

    /* Rows */
    .row{ margin-top: 18px; }
    .rowHeader{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
      margin: 12px 2px 10px;
    }
    .rowHeader h3{
      margin:0;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .25px;
    }
    .rowHeader .hint{
      margin:0;
      font-size: 12px;
      color: var(--muted);
    }

    .scroller{
      display:flex;
      gap:14px;
      overflow-x:auto;
      padding: 2px 2px 14px;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
    }
    .scroller::-webkit-scrollbar{ height: 10px; }
    .scroller::-webkit-scrollbar-thumb{
      background:#d1d5db;
      border-radius: 999px;
    }

    /* Cards */
    .card{
      flex:0 0 auto;
      width: 270px;
      cursor:pointer;
      scroll-snap-align: start;
      transition: transform .12s ease;
      border-radius: calc(var(--radius) + 2px);
    }
    .card:hover{ transform: translateY(-3px); }

    .thumb{
      position:relative;
      border-radius: var(--radius);
      overflow:hidden;
      border:1px solid var(--stroke);
      background:#f3f4f6;
    }
    .thumb::before{ content:""; display:block; padding-top: 56.25%; } /* 16:9 */
    .thumb img{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit: cover;
      transform: scale(1.01);
    }

    .playDot{
      position:absolute;
      right:12px; bottom:12px;
      width:40px; height:40px;
      border-radius:999px;
      display:grid; place-items:center;
      background: rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(6px);
    }
    .playDot svg{ width:18px; height:18px; fill:#fff; }

    .info{ padding:10px 4px 0; }
    .info .t{
      margin:0;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .info .d{
      margin:6px 0 0;
      font-size: 12px;
      color: var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .card.active .thumb{
      border-color: rgba(57,86,232,.95);
      box-shadow: 0 0 0 4px rgba(57,86,232,.16);
    }

    /* Shorts vertical */
    .card.short{ width: 190px; }
    .card.short .thumb::before{ padding-top: 177%; } /* ~9:16 */

    /* Very wide screens */
    @media (min-width: 1400px){
      .page{ max-width: 1340px; }
      .card{ width: 290px; }
      .card.short{ width: 200px; }
    }

    /* If embedded narrow, it will still adapt */
    @media (max-width: 900px){
      .page{ padding: 16px; }
      .card{ width: 220px; }
      .card.short{ width: 160px; }
      .player::before{ padding-top: 56.25%; }
      .brand h1{ font-size: 18px; }
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="top">
      <div class="brand">
        <h1 id="playerTitle">Reproduciendo…</h1>
        <p id="playerSub">Selecciona un video para cambiar</p>
      </div>
      <div class="pill" id="playerPill">Vimeo</div>
    </div>

    <div class="player">
      <iframe id="player" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
    </div>

    <div class="row">
      <div class="rowHeader">
        <h3>Videos</h3>
        <p class="hint">Scroll horizontal →</p>
      </div>
      <div class="scroller" id="videosRow"></div>
    </div>

    <div class="row">
      <div class="rowHeader">
        <h3>Shorts</h3>
        <p class="hint">Scroll horizontal →</p>
      </div>
      <div class="scroller" id="shortsRow"></div>
    </div>

  </div>

  <script>
    // === SOLO LINKS ===
    const VIDEO_URLS = [
      "https://vimeo.com/1165401559",
      "https://vimeo.com/1164760096",
      "https://vimeo.com/1163999799",
      "https://vimeo.com/1163296142",
      "https://vimeo.com/1162886903"
    ];

    const SHORT_URLS = [
      "https://vimeo.com/1162530735",
      "https://vimeo.com/1162531022",
      "https://vimeo.com/1162532496",
      "https://vimeo.com/1162533172",
      "https://vimeo.com/1147423087",
      "https://vimeo.com/1148342173",
      "https://vimeo.com/1148339371"
    ];

    function parseVimeo(url){
      const u = new URL(url);
      const parts = u.pathname.split("/").filter(Boolean);
      const id = parts[0] || "";
      return { id, url: `https://vimeo.com/${id}` };
    }

    function buildPlayerSrc(id){
      const p = new URLSearchParams({
        autoplay: "1",
        title: "0",
        byline: "0",
        portrait: "0",
        dnt: "1"
      });
      return `https://player.vimeo.com/video/${id}?${p.toString()}`;
    }

    function oembedUrl(vimeoUrl){
      const p = new URLSearchParams({ url: vimeoUrl });
      return `https://vimeo.com/api/oembed.json?${p.toString()}`;
    }

    async function fetchOembed(vimeoUrl){
      const res = await fetch(oembedUrl(vimeoUrl));
      if(!res.ok) throw new Error("oEmbed error");
      return await res.json();
    }

    function playIcon(){
      return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>`;
    }

    function setActiveCard(card){
      document.querySelectorAll(".card.active").forEach(c => c.classList.remove("active"));
      card.classList.add("active");
    }

    function setTop(title, sub, id){
      document.getElementById("playerTitle").textContent = title || "Video";
      document.getElementById("playerSub").textContent = sub || "";
      document.getElementById("playerPill").textContent = `Vimeo • ${id}`;
    }

    function play(id, title, subtitle){
      document.getElementById("player").src = buildPlayerSrc(id);
      setTop(title, subtitle, id);
      document.querySelector(".player").scrollIntoView({behavior:"smooth", block:"start"});
    }

    async function renderRow(container, urls, isShort=false){
      for (const raw of urls){
        const v = parseVimeo(raw);

        const card = document.createElement("div");
        card.className = "card" + (isShort ? " short" : "");
        card.dataset.id = v.id;

        card.innerHTML = `
          <div class="thumb">
            <img alt="thumbnail" loading="lazy" />
            <div class="playDot">${playIcon()}</div>
          </div>
          <div class="info">
            <p class="t">Cargando…</p>
            <p class="d"></p>
          </div>
        `;
        container.appendChild(card);

        try{
          const data = await fetchOembed(v.url);
          card.querySelector("img").src = data.thumbnail_url || "";
          card.querySelector(".t").textContent = data.title || `Vimeo ${v.id}`;
          card.querySelector(".d").textContent = data.author_name ? `por ${data.author_name}` : (isShort ? "Short" : "Video");
          card.dataset.title = data.title || "";
          card.dataset.sub = data.author_name ? `por ${data.author_name}` : "";
        }catch(e){
          card.querySelector(".t").textContent = `Vimeo ${v.id}`;
          card.querySelector(".d").textContent = isShort ? "Short" : "Video";
          card.dataset.title = `Vimeo ${v.id}`;
          card.dataset.sub = isShort ? "Short" : "Video";
        }

        card.addEventListener("click", () => {
          setActiveCard(card);
          play(v.id, card.dataset.title, card.dataset.sub);
        });
      }
    }

    (async function init(){
      const videosRow = document.getElementById("videosRow");
      const shortsRow = document.getElementById("shortsRow");

      await renderRow(videosRow, VIDEO_URLS, false);
      await renderRow(shortsRow, SHORT_URLS, true);

      const first = videosRow.querySelector(".card");
      if(first){
        first.classList.add("active");
        play(first.dataset.id, first.dataset.title || "Video", first.dataset.sub || "");
      }
    })();
  </script>
</body>
</html>
