<!-- VIDEOLLAMADA SECTION -->
<div class="bg-white rounded-2xl p-6 shadow-lg border-2 border-emerald-200">
    <h3 class="text-xl font-bold text-slate-900 mb-4 pb-3 border-b-2 border-emerald-200 flex items-center gap-2">
        🎥 Videollamada
    </h3>
    
    <!-- Link de videollamada guardado -->
    <div id="video-link-display">
        <div class="bg-gradient-to-r from-emerald-50 to-white p-4 rounded-xl border-2 border-emerald-300 mb-4">
            <div class="flex justify-between items-start mb-3">
                <div class="flex-1">
                    <div class="text-sm font-semibold text-slate-700 mb-2">Link de Sesión:</div>
                    <div class="text-sm text-slate-600 break-all" id="saved-video-link">
                        https://zoom.us/j/123456789
                    </div>
                </div>
                <button onclick="editVideoLink()" class="ml-2 text-slate-500 hover:text-slate-700" title="Editar">
                    ✏️
                </button>
            </div>
            <div class="flex gap-2">
                <button onclick="startVideoCall()" class="flex-1 px-4 py-3 bg-gradient-to-r from-emerald-600 to-emerald-700 text-white rounded-xl font-semibold hover:shadow-lg transition-all flex items-center justify-center gap-2">
                    🎥 Iniciar Sesión
                </button>
                <button onclick="copyVideoLink()" class="px-4 py-3 bg-slate-100 text-slate-700 rounded-xl font-semibold hover:bg-slate-200 transition-colors flex items-center gap-2">
                    📋 Copiar Link
                </button>
            </div>
        </div>
    </div>

    <!-- Formulario para añadir/editar link (oculto por defecto) -->
    <div id="video-link-form" class="hidden mb-4">
        <div class="mb-3">
            <label class="block font-semibold text-slate-700 mb-2 text-sm">Link de Videollamada (Zoom, Meet, Teams)</label>
            <input 
                type="url" 
                id="video-link-input"
                placeholder="https://zoom.us/j/..." 
                class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 transition-all outline-none"
                value="https://zoom.us/j/123456789"
            >
        </div>
        <div class="flex gap-2">
            <button onclick="saveVideoLink()" class="flex-1 px-4 py-2 bg-emerald-600 text-white rounded-lg font-semibold hover:bg-emerald-700 transition-colors">
                💾 Guardar Link
            </button>
            <button onclick="cancelEditVideoLink()" class="px-4 py-2 bg-slate-200 text-slate-700 rounded-lg font-semibold hover:bg-slate-300 transition-colors">
                Cancelar
            </button>
        </div>
    </div>

    <!-- Info adicional -->
    <div class="p-3 bg-blue-50 rounded-lg text-sm text-blue-800">
        <strong>💡 Tip:</strong> Puedes usar Zoom, Google Meet, Microsoft Teams o cualquier plataforma de videollamadas.
    </div>
</div>
