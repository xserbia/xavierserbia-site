<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>XS – Vimeo Player</title>

  <style>
    :root{
      --bg:#ffffff;
      --ink:#0f172a;
      --muted:#64748b;
      --stroke:#e5e7eb;
      --accent:#3956E8;
      --radius:14px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    .wrap{ padding:16px; }

    /* PLAYER */
    .player{
      position:relative;
      width:100%;
      border:1px solid var(--stroke);
      border-radius:16px;
      overflow:hidden;
      background:#000;
    }
    .player::before{ content:""; display:block; padding-top:56.25%; } /* 16:9 */
    .player iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }

    .meta{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      padding:10px 2px 0;
      margin-bottom:14px;
    }
    .meta .txt{ min-width:0; }
    .meta .title{
      margin:0;
      font-size:16px;
      font-weight:900;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .meta .sub{
      margin:4px 0 0;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .pill{
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      color:var(--muted);
      white-space:nowrap;
    }

    /* ROWS */
    .row{ margin-top:14px; }
    .rowHeader{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      margin:10px 2px 8px;
      gap:10px;
    }
    .rowHeader h3{
      margin:0;
      font-size:13px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.2px;
    }
    .rowHeader .hint{ margin:0; font-size:12px; color:var(--muted); }

    .scroller{
      display:flex;
      gap:12px;
      overflow-x:auto;
      padding:2px 2px 12px;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
    }
    .scroller::-webkit-scrollbar{ height:8px; }
    .scroller::-webkit-scrollbar-thumb{ background:#d1d5db; border-radius:999px; }

    /* CARD */
    .card{
      flex:0 0 auto;
      width:210px;
      cursor:pointer;
      scroll-snap-align:start;
      border-radius: calc(var(--radius) + 2px);
      transition: transform .12s ease;
    }
    .card:hover{ transform: translateY(-2px); }

    .thumb{
      position:relative;
      border-radius: var(--radius);
      overflow:hidden;
      border:1px solid var(--stroke);
      background:#f3f4f6;
    }
    .thumb::before{ content:""; display:block; padding-top:56.25%; } /* 16:9 */
    .thumb img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }

    .playDot{
      position:absolute;
      right:10px; bottom:10px;
      width:34px; height:34px;
      border-radius:999px;
      display:grid; place-items:center;
      background: rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(6px);
    }
    .playDot svg{ width:16px; height:16px; fill:#fff; }

    .info{ padding:8px 4px 0; }
    .info .t{
      margin:0;
      font-size:13px;
      font-weight:900;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .info .d{
      margin:5px 0 0;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .card.active .thumb{
      border-color: rgba(57,86,232,.92);
      box-shadow: 0 0 0 3px rgba(57,86,232,.18);
    }

    /* Shorts: vertical look */
    .card.short{ width:150px; }
    .card.short .thumb::before{ padding-top: 177%; } /* ~9:16 */
    @media (max-width:520px){
      .card{ width:190px; }
      .card.short{ width:135px; }
      .meta .title{ font-size:15px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="player">
      <iframe id="player" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
    </div>

    <div class="meta">
      <div class="txt">
        <p class="title" id="playerTitle">Reproduciendo…</p>
        <p class="sub" id="playerSub">Toca un video para cambiar</p>
      </div>
      <div class="pill" id="playerPill">Vimeo</div>
    </div>

    <div class="row">
      <div class="rowHeader">
        <h3>Videos</h3>
        <p class="hint">Desliza →</p>
      </div>
      <div class="scroller" id="videosRow"></div>
    </div>

    <div class="row">
      <div class="rowHeader">
        <h3>Shorts</h3>
        <p class="hint">Desliza →</p>
      </div>
      <div class="scroller" id="shortsRow"></div>
    </div>
  </div>

  <script>
    // ===========================
    // SOLO LINKS (NO TITULOS MANUALES)
    // ===========================
    const VIDEO_URLS = [
      "https://vimeo.com/1165401559",
      "https://vimeo.com/1164760096",
      "https://vimeo.com/1163999799",
      "https://vimeo.com/1163296142",
      "https://vimeo.com/1162886903"
    ];

    const SHORT_URLS = [
      "https://vimeo.com/1162530735",
      "https://vimeo.com/1162531022",
      "https://vimeo.com/1162532496",
      "https://vimeo.com/1162533172",
      "https://vimeo.com/1147423087",
      "https://vimeo.com/1148342173",
      "https://vimeo.com/1148339371"
    ];

    // ===== Helpers =====
    function parseVimeo(url){
      const u = new URL(url);
      const parts = u.pathname.split("/").filter(Boolean);
      const id = parts[0] || "";
      return { id, url: `https://vimeo.com/${id}` };
    }

    function buildPlayerSrc(id){
      const p = new URLSearchParams({
        autoplay: "1",
        title: "0",
        byline: "0",
        portrait: "0",
        dnt: "1"
      });
      return `https://player.vimeo.com/video/${id}?${p.toString()}`;
    }

    function oembedUrl(vimeoUrl){
      const p = new URLSearchParams({ url: vimeoUrl });
      return `https://vimeo.com/api/oembed.json?${p.toString()}`;
    }

    async function fetchOembed(vimeoUrl){
      const res = await fetch(oembedUrl(vimeoUrl));
      if(!res.ok) throw new Error("oEmbed error");
      return await res.json();
    }

    function playIcon(){
      return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>`;
    }

    function setActiveCard(card){
      document.querySelectorAll(".card.active").forEach(c => c.classList.remove("active"));
      card.classList.add("active");
    }

    function play(id, title, subtitle){
      document.getElementById("player").src = buildPlayerSrc(id);
      document.getElementById("playerTitle").textContent = title || "Video";
      document.getElementById("playerSub").textContent = subtitle || "";
      document.getElementById("playerPill").textContent = "";
      document.querySelector(".player").scrollIntoView({behavior:"smooth", block:"start"});
    }

    async function renderRow(container, urls, isShort=false){
      for (const raw of urls){
        const v = parseVimeo(raw);

        const card = document.createElement("div");
        card.className = "card" + (isShort ? " short" : "");
        card.dataset.id = v.id;

        card.innerHTML = `
          <div class="thumb">
            <img alt="thumbnail" loading="lazy" />
            <div class="playDot">${playIcon()}</div>
          </div>
          <div class="info">
            <p class="t">Cargando…</p>
            <p class="d"></p>
          </div>
        `;
        container.appendChild(card);

        try{
          const data = await fetchOembed(v.url);
          card.querySelector("img").src = data.thumbnail_url || "";
          card.querySelector(".t").textContent = data.title || `Vimeo ${v.id}`;
          card.querySelector(".d").textContent = data.author_name ? `por ${data.author_name}` : (isShort ? "Short" : "Video");
          card.dataset.title = data.title || "";
          card.dataset.author = data.author_name || "";
        }catch(e){
          // fallback visual si falla oEmbed
          card.querySelector(".t").textContent = `Vimeo ${v.id}`;
          card.querySelector(".d").textContent = isShort ? "Short" : "Video";
        }

        card.addEventListener("click", () => {
          setActiveCard(card);
          const title = card.dataset.title || card.querySelector(".t").textContent;
          const author = card.dataset.author ? `por ${card.dataset.author}` : card.querySelector(".d").textContent;
          play(v.id, title, author);
        });
      }
    }

    (async function init(){
      const videosRow = document.getElementById("videosRow");
      const shortsRow = document.getElementById("shortsRow");

      await renderRow(videosRow, VIDEO_URLS, false);
      await renderRow(shortsRow, SHORT_URLS, true);

      // auto-play first
      const first = videosRow.querySelector(".card");
      if(first){
        first.classList.add("active");
        const id = first.dataset.id;
        const title = first.dataset.title || "Video";
        const author = first.dataset.author ? `por ${first.dataset.author}` : "";
        play(id, title, author);
      }
    })();
  </script>
</body>
</html>
