<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Vimeo Horizontal Player</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#ffffff;
  color:#111;
}

.wrap{
  padding:16px;
}

/* PLAYER */
.player{
  position:relative;
  width:100%;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:20px;
}
.player::before{
  content:"";
  display:block;
  padding-top:56.25%;
}
.player iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
}

/* ROW */
.row{
  margin-bottom:24px;
}
.row h3{
  margin:0 0 10px 4px;
  font-size:14px;
  font-weight:700;
  text-transform:uppercase;
}

/* horizontal scroll */
.scroller{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding-bottom:10px;
}
.scroller::-webkit-scrollbar{
  height:8px;
}
.scroller::-webkit-scrollbar-thumb{
  background:#ddd;
  border-radius:999px;
}

/* CARD */
.card{
  flex:0 0 auto;
  width:200px;
  cursor:pointer;
}
.thumb{
  position:relative;
  width:100%;
  border-radius:12px;
  overflow:hidden;
  background:#eee;
}
.thumb::before{
  content:"";
  display:block;
  padding-top:56.25%;
}
.thumb img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}
.card p{
  margin:6px 0 0;
  font-size:13px;
  font-weight:600;
}

.card.active{
  outline:3px solid #3956E8;
  border-radius:14px;
}
</style>
</head>

<body>
<div class="wrap">

  <div class="player">
    <iframe id="player" allow="autoplay; fullscreen" allowfullscreen></iframe>
  </div>

  <div class="row">
    <h3>Videos</h3>
    <div class="scroller" id="videosRow"></div>
  </div>

  <div class="row">
    <h3>Shorts</h3>
    <div class="scroller" id="shortsRow"></div>
  </div>

</div>

<script>

// ===== EDITA SOLO ESTO =====
const VIDEOS = [
  { id:"76979871", title:"Episodio 1" },
  { id:"22439234", title:"Episodio 2" },
  { id:"146022717", title:"Masterclass" }
];

const SHORTS = [
  { id:"76979871", title:"Tip 1" },
  { id:"22439234", title:"Tip 2" },
  { id:"146022717", title:"Tip 3" }
];
// ============================

function buildPlayer(id){
  return `https://player.vimeo.com/video/${id}?autoplay=1&title=0&byline=0&portrait=0`;
}

function loadThumbnail(videoId){
  return fetch(`https://vimeo.com/api/oembed.json?url=https://vimeo.com/${videoId}`)
    .then(res => res.json())
    .then(data => data.thumbnail_url)
    .catch(()=> null);
}

function renderRow(container, list){
  list.forEach(video=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="thumb">
        <img src="" alt="">
      </div>
      <p>${video.title}</p>
    `;
    container.appendChild(card);

    const img = card.querySelector("img");

    loadThumbnail(video.id).then(url=>{
      if(url) img.src = url;
    });

    card.addEventListener("click", ()=>{
      document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
      card.classList.add("active");
      document.getElementById("player").src = buildPlayer(video.id);
      window.scrollTo({top:0, behavior:"smooth"});
    });
  });
}

renderRow(document.getElementById("videosRow"), VIDEOS);
renderRow(document.getElementById("shortsRow"), SHORTS);

// Cargar primero automáticamente
if(VIDEOS.length){
  document.getElementById("player").src = buildPlayer(VIDEOS[0].id);
}

</script>
</body>
</html>
